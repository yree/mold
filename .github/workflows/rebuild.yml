name: rebuild-dependent-github-pages-sites

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-theme-repo
        uses: actions/checkout@v4

      - name: trigger-all-dependent-sites
        run: |
          echo "Starting fan-out rebuild..."

          while read repo; do
            # skip empty lines
            [ -z "$repo" ] && continue

            echo "Triggering $repo"

            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.PAT }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$repo/pages/builds

          done < .github/config/repos.txt

          echo "Done."

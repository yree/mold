name: rebuild-dependent-github-pages-sites

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest

    env:
      USERNAME: ${{ vars.USERNAME }}
      ORG_NAME: ${{ vars.ORG_NAME }}
      TOKEN: ${{ secrets.PAT }}

    steps:
      - name: trigger-rebuilds
        run: |
          echo "Fetching repositories..."

          repos=$( 
            curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.github.com/users/$USERNAME/repos?per_page=100" | jq -r '.[].full_name'

            curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.github.com/orgs/$ORG_NAME/repos?per_page=100" | jq -r '.[].full_name'
          )

          echo "Checking which repos have Pages enabled..."

          for repo in $repos; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              https://api.github.com/repos/$repo/pages)

            if [ "$status" = "200" ]; then
              echo "Triggering Pages build → $repo"

              curl -s -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/$repo/pages/builds
            fi
          done

          echo "Done."
